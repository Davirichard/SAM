<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro SAM</title>
    <link rel="stylesheet" href="css/style.css">
     <!--==== Box-icons ====-->
     <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/boxicons@latest/css/boxicons.min.css">
</head>
<body>
    <main>
        <div class="container">
            <div class="boxleft">
                <div class="background-opacity">
                    <h2>Seja Bem-vindo!</h2>
                    <p>Vamos continuar com a sessão? Clique em <span>Entrar</span> para continuar-mos</p>

                    <h4><span>S</span>.A.M</h4>

                    <div class="box-button">
                        <button><a href="#">Entrar</a></button>
                    </div>
                </div>
            </div>
            <div class="boxright">
                <h2>Acessar</h2>
                <!--<div class="box-acesso">
                    <div class="icon-acesso">
                        <i class='bx bxl-google'></i>
                    </div>
                    <div class="icon-acesso">
                        <i class='bx bxl-microsoft-teams'></i>
                    </div>
                    <div class="icon-acesso">
                        <i class='bx bxl-microsoft-teams'></i>
                    </div>
                </div>-->
                <form action="">
                    <div class="box-input">
                        <label for="">Entrar como</label>
                        <input type="text" placeholder="Informe o que você é ">
                    </div>
                    <div class="box-input">
                        <label for="">RM</label>
                        <input type="text" placeholder="Informe seu RM">
                    </div>
                    <div class="box-input">
                        <label for="">Senha</label>
                        <input type="password" placeholder="Informe sua Senha ">
                    </div>
                    <button><a href="#">Acessar <i class='bx bx-right-arrow-alt bx-fade-right' ></i></a></button>
    
                </form>
            </div>
        </div><!--container-->
    </main>
</body>
</html>
